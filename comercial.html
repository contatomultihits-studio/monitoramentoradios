<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA NO RÁDIO — Monitoramento Comercial</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes ping2 { 75%,100%{transform:scale(2);opacity:0} }
    .animate-ping2 { animation: ping2 1.5s cubic-bezier(0,0,0.2,1) infinite; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
    select, input { font-family: 'Inter', sans-serif; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.25s ease forwards; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

<!-- HEADER -->
<header class="bg-white border-b border-blue-100 sticky top-0 z-50 shadow-sm">
  <div class="max-w-5xl mx-auto px-6 h-24 flex items-center justify-between">
    <a href="/" class="flex items-center gap-4 hover:opacity-80 transition-opacity cursor-pointer">
      <div class="bg-gradient-to-br from-blue-500 to-indigo-600 p-3 rounded-2xl shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>
      </div>
      <div>
        <h1 class="font-black text-2xl tracking-tight text-slate-900 uppercase leading-none">IA NO RÁDIO</h1>
        <p class="text-xs font-bold text-blue-600 uppercase tracking-wider mt-1">Monitoramento Comercial · Maringá FM</p>
      </div>
    </a>
    <div class="flex items-center gap-3">
      <a href="/" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-slate-600 text-xs uppercase tracking-wider transition-all">← Voltar</a>
      <span id="last-update" class="text-xs font-bold text-slate-400 uppercase tracking-wider"></span>
      <button onclick="loadData()" id="btn-refresh-wrap" class="p-4 bg-blue-50 rounded-2xl hover:bg-blue-100 transition-all hover:scale-105 active:scale-95">
        <svg id="ico-refresh" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
    </div>
  </div>
</header>
