<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA NO RÁDIO - Monitoramento Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .font-black { font-weight: 900 !important; }
        .btn-monitor {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-monitor:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .btn-monitor:active {
            transform: translateY(-4px);
        }

        /* ── Em Breve overlay ── */
        .card-coming-soon {
            position: relative;
            cursor: default;
            pointer-events: none;
        }
        .card-coming-soon .coming-soon-overlay {
            position: absolute;
            inset: 0;
            border-radius: 1.5rem; /* rounded-3xl */
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 1.25rem;
            z-index: 10;
        }
        .badge-em-breve {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.45rem 1.2rem;
            border-radius: 9999px;
            box-shadow: 0 4px 16px rgba(245,158,11,0.45);
            animation: pulse-badge 2s ease-in-out infinite;
        }
        @keyframes pulse-badge {
            0%, 100% { box-shadow: 0 4px 16px rgba(245,158,11,0.45); transform: scale(1); }
            50%       { box-shadow: 0 4px 28px rgba(245,158,11,0.70); transform: scale(1.04); }
        }
        .card-coming-soon .inner-content {
            opacity: 0.4;
            filter: grayscale(0.6);
        }
    </style>
</head>
<body>
    <div class="max-w-5xl mx-auto px-6 py-10 text-center">
        <!-- HEADER -->
        <div class="mb-12">
            <div class="bg-gradient-to-br from-blue-500 to-indigo-600 p-6 rounded-3xl shadow-2xl inline-block mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/>
                    <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/>
                    <circle cx="12" cy="12" r="2"/>
                    <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/>
                    <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
                </svg>
            </div>
            <h1 class="font-black text-5xl tracking-tight text-slate-900 uppercase leading-none mb-4">IA NO RÁDIO</h1>
            <p class="text-xl font-bold text-blue-600 uppercase tracking-wider">Sistema de Monitoramento Inteligente</p>
        </div>

        <!-- BOTÕES -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <!-- BOTÃO MUSICAL -->
            <a href="musical" class="btn-monitor block bg-white rounded-3xl shadow-xl p-10 border-4 border-transparent hover:border-purple-400">
                <div class="bg-gradient-to-br from-purple-500 to-pink-600 p-6 rounded-2xl shadow-lg inline-block mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                </div>
                <h2 class="font-black text-3xl text-slate-900 uppercase mb-3">Monitoramento<br/>Musical</h2>
                <p class="text-slate-600 font-bold">Acompanhe músicas e execuções</p>
            </a>

            <!-- BOTÃO COMERCIAL — EM BREVE -->
            <div class="card-coming-soon btn-monitor bg-white rounded-3xl shadow-xl p-10 border-4 border-transparent">
                <!-- Overlay EM BREVE -->
                <div class="coming-soon-overlay" aria-hidden="true">
                    <span class="badge-em-breve">⏳ Em Breve</span>
                </div>
                <!-- Conteúdo desfocado -->
                <div class="inner-content">
                    <div class="bg-gradient-to-br from-blue-500 to-indigo-600 p-6 rounded-2xl shadow-lg inline-block mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/>
                            <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/>
                            <circle cx="12" cy="12" r="2"/>
                            <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/>
                            <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
                        </svg>
                    </div>
                    <h2 class="font-black text-3xl text-slate-900 uppercase mb-3">Monitoramento<br/>Comercial</h2>
                    <p class="text-slate-600 font-bold">Acompanhe anúncios e inserções</p>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <p class="text-center text-xs font-bold text-slate-300 uppercase tracking-widest mt-16">
            IA NO RÁDIO · Monitoramento em Tempo Real
        </p>
    </div>
</body>
</html>
