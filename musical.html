      window._supabaseClient = sbGuard;
      window._supabaseReady = true;
      
      console.log('[INIT] ✅ Client pronto, disparando evento...');
      // Dispara evento para o React saber que pode iniciar o boot
      window.dispatchEvent(new Event('supabase-ready'));
    })();
    </script>
