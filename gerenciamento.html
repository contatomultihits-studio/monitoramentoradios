<script>

<main class="max-w-5xl mx-auto px-6 py-10">

  <!-- CARD CRIAR USUÁRIO -->
  <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 mb-8">
    <div class="flex items-center gap-3 mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" x2="22" y1="11" y2="13"/><line x1="21" x2="23" y1="12" y2="12"/></svg>
      <h3 class="font-black text-xl text-slate-900 uppercase tracking-tight">Criar novo usuário</h3>
    </div>

    <div id="alerta-criar" class="hidden mb-5 rounded-2xl px-5 py-4"></div>

    <form onsubmit="criarUsuario(event)">
      <div class="mb-4">
        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">E-mail do usuário</label>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input id="inp-email-novo" type="email" placeholder="usuario@email.com" required
            class="w-full pl-12 pr-4 py-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700 border-2 border-transparent focus:border-blue-300 transition-all" />
        </div>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Nome completo</label>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="inp-nome-novo" type="text" placeholder="Nome do usuário" required

      <div class="bg-blue-50 border border-blue-200 rounded-2xl px-5 py-4 mb-6">
        <p class="font-bold text-blue-700 text-sm">🔑 Senha padrão: <code class="bg-white px-2 py-1 rounded font-mono">123mudar</code></p>
        <p class="text-xs text-blue-600 mt-1">O usuário será obrigado a trocar a senha no primeiro acesso.</p>
      </div>

      <button type="submit" id="btn-criar"
        class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black uppercase tracking-wider text-sm flex items-center justify-center gap-3 transition-all shadow-xl hover:shadow-2xl transform hover:scale-105 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
        Criar usuário agora
      </button>
    </form>
  </div>

  <!-- LISTA DE USUÁRIOS -->
  <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <h3 class="font-black text-xl text-slate-900 uppercase tracking-tight">Usuários cadastrados</h3>
      </div>
      <button onclick="carregarUsuarios()" class="p-3 bg-blue-50 rounded-xl hover:bg-blue-100 transition-all">
        <svg id="ico-refresh-lista" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
    </div>

    <div id="lista-usuarios"></div>
  </div>

</main>

<script>
const SUPABASE_URL = 'https://ojtdpnrjulrlhxvbmsnr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qdGRwbnJqdWxybGh4dmJtc25yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNTcyOTEsImV4cCI6MjA4MzYzMzI5MX0.yFxbWvKgOkP_-ludtajzsqjE1nZiah3iOJbLQT_le_E';

async function fazerLogout() {
  const sb = window._supabaseClient;
  if (sb) await sb.auth.signOut();
  window.location.href = '/login';
}

async function criarUsuario(e) {
  e.preventDefault();
  const email = document.getElementById('inp-email-novo').value.trim();
  const nome = document.getElementById('inp-nome-novo').value.trim();
  const btn = document.getElementById('btn-criar');
  const alerta = document.getElementById('alerta-criar');

  btn.disabled = true;
  btn.innerHTML = '<svg class="spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Criando...';
  alerta.classList.add('hidden');

  try {
    const sb = window._supabaseClient;

    // 1. Cria o usuário no Auth com senha padrão
    const { data: authData, error: authError } = await sb.auth.signUp({
      email: email,
      password: '123mudar',
      options: {
        emailRedirectTo: window.location.origin + '/trocar-senha',
        data: { nome: nome }
      }
    });

    if (authError) throw new Error(authError.message);
    if (!authData.user) throw new Error('Erro ao criar usuário');

    // 2. Confirma o email automaticamente (bypass de confirmação)
    const confirmRes = await fetch(`${SUPABASE_URL}/rest/v1/rpc/confirm_user_email`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ user_id: authData.user.id })
    }).catch(() => null); // Ignora erro se RPC não existir

    // 3. Insere perfil do usuário
    const { error: perfilError } = await sb.from('perfis_usuarios').insert({
      user_id: authData.user.id,
      nome: nome,
      radios_acesso: ['maringa_fm'],
      ativo: true,
      senha_alterada: false
    });

    if (perfilError) throw new Error(perfilError.message);

    // Sucesso!
    alerta.className = 'mb-5 bg-green-50 border border-green-200 rounded-2xl px-5 py-4';
    alerta.innerHTML = `<p class="font-bold text-green-700 text-sm">✅ Usuário <strong>${email}</strong> criado com sucesso!</p><p class="text-xs text-green-600 mt-1">Senha: <code class="bg-white px-2 py-1 rounded font-mono">123mudar</code> (será trocada no primeiro acesso)</p>`;
    alerta.classList.remove('hidden');

    document.getElementById('inp-email-novo').value = '';
    document.getElementById('inp-nome-novo').value = '';

    carregarUsuarios();

  } catch (err) {
    alerta.className = 'mb-5 bg-red-50 border border-red-200 rounded-2xl px-5 py-4';
    alerta.innerHTML = `<p class="font-bold text-red-600 text-sm">❌ Erro: ${err.message}</p>`;
    alerta.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg> Criar usuário agora';
  }
}

async function carregarUsuarios() {
  const container = document.getElementById('lista-usuarios');
  const ico = document.getElementById('ico-refresh-lista');
  ico.style.animation = 'spin 1s linear infinite';

  container.innerHTML = '<div class="py-12 text-center"><svg class="animate-spin mx-auto text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><p class="font-bold text-slate-400 text-sm uppercase">Carregando...</p></div>';

  try {
    const sb = window._supabaseClient;
    const { data, error } = await sb.from('perfis_usuarios').select('*').order('criado_em', { ascending: false });

    if (error) throw error;

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="bg-slate-50 rounded-2xl p-12 text-center"><p class="font-bold text-slate-400 text-sm uppercase">📋 Nenhum usuário cadastrado ainda</p></div>';
      return;
    }

    container.innerHTML = data.map(u => `
      <div class="bg-slate-50 rounded-2xl p-5 mb-3 flex items-center justify-between hover:bg-slate-100 transition-all">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center font-black text-blue-600 text-lg">${u.nome.charAt(0).toUpperCase()}</div>
          <div>
            <p class="font-black text-slate-800 text-sm">${u.nome}</p>
            <p class="text-xs text-slate-500 font-bold">${u.user_id}</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          ${u.senha_alterada ? '<span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-black">✅ Senha alterada</span>' : '<span class="px-3 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-black">⏳ Aguardando troca</span>'}
          ${u.ativo ? '<span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-black">✅ Ativo</span>' : '<span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-black">❌ Inativo</span>'}
        </div>
      </div>
    `).join('');

  } catch (err) {
    container.innerHTML = `<div class="bg-red-50 rounded-2xl p-8 text-center"><p class="font-bold text-red-600 text-sm">❌ Erro ao carregar: ${err.message}</p></div>`;
  } finally {
    ico.style.animation = '';
  }
}

// Carrega usuários ao abrir a página
setTimeout(carregarUsuarios, 500);
</script>
</body>
