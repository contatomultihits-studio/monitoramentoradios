<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA NO RÁDIO — Login</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.35s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md fade-up">

    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-600 p-5 rounded-3xl shadow-2xl mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>
      </div>
      <h1 class="font-black text-3xl tracking-tight text-slate-900 uppercase leading-none">IA NO RÁDIO</h1>
      <p class="text-sm font-bold text-blue-600 uppercase tracking-wider mt-2">Monitoramento · Acesso Restrito</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8">
      <h2 class="font-black text-xl text-slate-800 mb-6 uppercase tracking-tight">Entrar na plataforma</h2>

      <div id="alerta" class="hidden mb-5 bg-red-50 border border-red-200 rounded-2xl px-5 py-4">
        <p class="font-bold text-red-600 text-sm" id="alerta-msg"></p>
      </div>

      <form onsubmit="fazerLogin(event)" autocomplete="on">
        <div class="mb-4">
          <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">E-mail</label>
          <div class="relative">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input id="inp-email" type="email" autocomplete="email" placeholder="seu@email.com" required
              class="w-full pl-12 pr-4 py-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700 border-2 border-transparent focus:border-blue-300 transition-all" />
          </div>
        </div>
        <div class="mb-6">
          <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Senha</label>
          <div class="relative">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="inp-senha" type="password" autocomplete="current-password" placeholder="••••••••" required
              class="w-full pl-12 pr-4 py-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700 border-2 border-transparent focus:border-blue-300 transition-all" />
          </div>
        </div>
        <button type="submit" id="btn-login"
          class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black uppercase tracking-wider text-sm flex items-center justify-center gap-3 transition-all shadow-xl hover:shadow-2xl transform hover:scale-105 active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-xs font-bold text-slate-300 uppercase tracking-widest mt-8">
      IA NO RÁDIO · Acesso autorizado apenas para usuários cadastrados
    </p>
  </div>

<script>
  const SUPABASE_URL = 'https://ojtdpnrjulrlhxvbmsnr.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qdGRwbnJqdWxybGh4dmJtc25yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNTcyOTEsImV4cCI6MjA4MzYzMzI5MX0.yFxbWvKgOkP_-ludtajzsqjE1nZiah3iOJbLQT_le_E';
  const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Se já estiver logado, checa se precisa trocar senha
  (async () => {
    const { data: { session } } = await sbClient.auth.getSession();
    if (session) {
      await checkPrimeiroAcesso(session);
    }
  })();

  async function checkPrimeiroAcesso(session) {
    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/comercial';
    const { data: perfil } = await sbClient
      .from('perfis_usuarios')
      .select('senha_alterada')
      .eq('user_id', session.user.id)
      .single();

    if (perfil && perfil.senha_alterada === false) {
      window.location.href = '/trocar-senha?redirect=' + encodeURIComponent(redirect);
    } else {
      window.location.href = redirect;
    }
  }

  async function fazerLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const email = document.getElementById('inp-email').value.trim();
    const senha = document.getElementById('inp-senha').value;

    btn.disabled = true;
    btn.innerHTML = '<svg class="spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Entrando...';
    document.getElementById('alerta').classList.add('hidden');

    const { data, error } = await sbClient.auth.signInWithPassword({ email, password: senha });

    if (error) {
      btn.disabled = false;
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg> Entrar';
      document.getElementById('alerta').classList.remove('hidden');
      document.getElementById('alerta-msg').textContent = '❌ E-mail ou senha incorretos. Tente novamente.';
      return;
    }

    // Checa primeiro acesso
    await checkPrimeiroAcesso(data.session);
  }
</script>
</body>
</html>
